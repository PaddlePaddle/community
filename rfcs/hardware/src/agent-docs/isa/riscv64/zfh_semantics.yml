# RISC-V64 Zfh Extension Semantics (完整扩展)
semantics:
  fadd_h:
    description: "fadd.h rd, rs1, rs2"
    operations:
      - type: f_alu
        op: Add
        dest: $f.rd
        src1: $f.rs1
        src2: $f.rs2
        precision: Half
    implicit_pc_read: false
    implicit_pc_write: false

  fsub_h:
    description: "fsub.h rd, rs1, rs2"
    operations:
      - type: f_alu
        op: Sub
        dest: $f.rd
        src1: $f.rs1
        src2: $f.rs2
        precision: Half
    implicit_pc_read: false
    implicit_pc_write: false

  fmul_h:
    description: "fmul.h rd, rs1, rs2"
    operations:
      - type: f_alu
        op: Mul
        dest: $f.rd
        src1: $f.rs1
        src2: $f.rs2
        precision: Half
    implicit_pc_read: false
    implicit_pc_write: false

  fdiv_h:
    description: "fdiv.h rd, rs1, rs2"
    operations:
      - type: f_alu
        op: Div
        dest: $f.rd
        src1: $f.rs1
        src2: $f.rs2

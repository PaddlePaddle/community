        addr: $temp:0
        size: 2
        signed: false
    implicit_pc_read: false
    implicit_pc_write: false


  lui:
    description: "lui rd, imm: rd = sext((imm << 12)[31:0])"
    operations:
      - type: alu
        op: Shl
        dest: $temp:0
        src1: $imm:20
        src2: '12'
      - type: alu
        op: Shl
        dest: $temp:1
        src1: $temp:0
        src2: '32'
      - type: alu
        op: Sar
        dest: $x.rd
        src1: $temp:1
        src2: '32'
    implicit_pc_read: false
    implicit_pc_write: false


  lw:
    description: "\"lw\" rd, offset(rs1)"
    operations:
      - type: alu
        op: Add
        dest: $temp:0
        src1: $x.rs1
        src2: $imm:12:signed
      - type: load
        dest: $x.rd
        addr: $temp:0
        size: 4
        signed: true
    implicit_pc_read: false
    implicit_pc_write: false


  lwu:
    description: "\"lwu\" rd, offset(rs1)"

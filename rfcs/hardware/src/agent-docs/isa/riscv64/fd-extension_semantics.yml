# RISC-V64 semantics - generated from hardcoded definitions
semantics:
  fadd_d:
    description: "\"fadd_d\" rd, rs1, rs2"
    operations:
      - type: f_alu
        op: Add
        dest: $f.rd
        src1: $f.rs1
        src2: $f.rs2
        precision: Double
    implicit_pc_read: false
    implicit_pc_write: false



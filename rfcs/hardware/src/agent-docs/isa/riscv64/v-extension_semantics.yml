semantics:
  vsetvli:
    description: vsetvli rd, rs1, vtype_imm
    operations:
    - type: vector_config
      vtype: $zimm:11
      avl: $x.rs1
      vl_dest: $x.rd
      vtype_dest: $csr:vtype
  vsetvl:
    description: vsetvl rd, rs1, rs2 (rs2 contains vtype value)
    operations:
    - type: vector_config
      vtype: $x.rs2
      avl: $x.rs1
      vl_dest: $x.rd
      vtype_dest: $csr:vtype
  vadd.vv:
    description: vadd.vv vd, vs2, vs1
    operations:
    - type: vector_alu
      op: Add
      elem_width: Dynamic
      dest: $v.vd
      src1: $v.vs2
      src2: $v.vs1
  vsub.vv:
    description: vsub.vv vd, vs2, vs1
    operations:
    - type: vector_alu
      op: Sub
      elem_width: Dynamic
      dest: $v.vd
      src1: $v.vs2
      src2: $v.vs1
  vand.vv:
    description: vand.vv vd, vs2, vs1
    operations:
    - type: vector_alu
      op: And
      elem_width: Dynamic
      dest: $v.vd
      src1: $v.vs2
      src2: $v.vs1
  vandn.vv:
    description: vandn.vv vd, vs2, vs1 (~vs2 & vs1)
    operations:
    - type: vector_alu
      op: Andn
      elem_width: Dynamic
      dest: $v.vd
      src1: $v.vs1
      src2: $v.vs2
  vandn.vx:
    description: vandn.vx vd, vs2, rs1 (vs2 & ~rs1)
    operations:
    - type: vector_alu
      op: Andn
      elem_width: Dynamic
      dest: $v.vd
      src1: $x.rs1
      src2: $v.vs2
  vor.vv:
    description: vor.vv vd, vs2, vs1
    operations:
    - type: vector_alu
      op: Or
      elem_width: Dynamic
      dest: $v.vd
      src1: $v.vs2
      src2: $v.vs1
  vxor.vv:
    description: vxor.vv vd, vs2, vs1
    operations:
    - type: vector_alu
      op: Xor
      elem_width: Dynamic
      dest: $v.vd
      src1: $v.vs2
      src2: $v.vs1
  vadd.vx:
    description: vadd.vx vd, vs2, rs1
    operations:
    - type: vector_alu
      op: Add
      elem_width: Dynamic
      dest: $v.vd
      src1: $v.vs2

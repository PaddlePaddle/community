groups:
- name: crypto_aes
  description: AES 密码学指令
- name: crypto_sha512
  description: SHA-512 密码学指令
instructions:
- name: AES64ES
  group: crypto_aes
  encoding:
    match: 0011001 ????? ????? 000 ????? 0110011
  assembly: aes64es {rd}, {rs1}, {rs2}
  format: R-type
- name: AES64ESM
  group: crypto_aes
  encoding:
    match: 0011011 ????? ????? 000 ????? 0110011
  assembly: aes64esm {rd}, {rs1}, {rs2}
  format: R-type
- name: AES64DS
  group: crypto_aes
  encoding:
    match: 0011101 ????? ????? 000 ????? 0110011
  assembly: aes64ds {rd}, {rs1}, {rs2}
  format: R-type
- name: AES64DSM
  group: crypto_aes
  encoding:
    match: 0011111 ????? ????? 000 ????? 0110011
  assembly: aes64dsm {rd}, {rs1}, {rs2}
  format: R-type
- name: AES64IM
  group: crypto_aes
  encoding:
    match: 0011000 00000 ????? 001 ????? 0010011
  assembly: aes64im {rd}, {rs1}
  format: R-type-unary
- name: AES64KS1I
  group: crypto_aes
  encoding:
    match: 0011000 1???? ????? 001 ????? 0010011
    variables:
      rnum:
      - 23
      - 20
  assembly: aes64ks1i {rd}, {rs1}, {rnum}
  format: R-type-unary
- name: AES64KS2
  group: crypto_aes
  encoding:
    match: 0111111 ????? ????? 000 ????? 0110011
  assembly: aes64ks2 {rd}, {rs1}, {rs2}
  format: R-type
- name: SHA512SUM0
  group: crypto_sha512
  encoding:
    match: 0001000 00100 ????? 001 ????? 0010011
  assembly: sha512sum0 {rd}, {rs1}
  format: R-type-unary
- name: SHA512SUM1
  group: crypto_sha512
  encoding:
    match: 0001000 00101 ????? 001 ????? 0010011
  assembly: sha512sum1 {rd}, {rs1}
  format: R-type-unary
- name: SHA512SIG0
  group: crypto_sha512
  encoding:
    match: 0001000 00110 ????? 001 ????? 0010011
  assembly: sha512sig0 {rd}, {rs1}
  format: R-type-unary
- name: SHA512SIG1
  group: crypto_sha512
  encoding:
    match: 0001000 00111 ????? 001 ????? 0010011
  assembly: sha512sig1 {rd}, {rs1}
  format: R-type-unary
    operations:
      - type: atomic
        op: Or
        dest: $x.rd
        addr: $x.rs1
        src: $x.rs2
        ordering: Relaxed
        size: 2
    implicit_pc_read: false
    implicit_pc_write: false

  amoxor_h:

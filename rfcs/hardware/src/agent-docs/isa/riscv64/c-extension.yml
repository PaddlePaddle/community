# === Zcmt (Code Size Reduction: Table Jump) ===
# cm.jt and cm.jalt share the same encoding pattern
# distinguished by index range (0-31 = jt, 32-255 = jalt)
# NOTE: In RV64, C_FSDSP occupies the 101???????????10 encoding space,
# so Zcmt instructions are shadowed when D extension is present.
- name: CM_JT
  group: compressed
  encoding:
    match: 10100?????????10
    bit_length: 16
  assembly: cm.jt {index}
  format: C-Zcmt-jt

- name: CM_JALT
  group: compressed
  encoding:
    match: 10101?????????10
    bit_length: 16
  assembly: cm.jalt {index}
  format: C-Zcmt-jalt

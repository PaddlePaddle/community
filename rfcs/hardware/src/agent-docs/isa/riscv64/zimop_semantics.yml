# RISC-V Zimop Extension Semantics
# Default behavior: write 0 to x[rd]

semantics:
  mop.r.0:
    description: "mop.r.0 rd, rs1 (write 0 to rd)"
    operations:
      - type: move
        dest: $x.rd
        src: $x.0
    implicit_pc_read: false
    implicit_pc_write: false


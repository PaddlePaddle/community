groups:
- name: base
  description: LoongArch Base Integer Instructions
instructions:
- name: LL.W
  group: base
  encoding:
    match: 00100000????????????????????????
  assembly: ll.w $d, $j, $imm
  semantics:
    description: ll.w rd, si14(rj)
    operations:
    - type: alu
      op: Add
      dest: $temp:0
      src1: $r.j
      src2: $imm:14:signed
    - type: load
      dest: $r.d
      addr: $temp:0
      size: 4
      signed: false
    implicit_pc_read: false
    implicit_pc_write: false
  format: DJI14

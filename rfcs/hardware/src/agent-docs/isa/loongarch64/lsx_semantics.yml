semantics:
  vadd.b:
    description: vadd.b vd, vj, vk (vector add byte)
    operations:
    - type: vector_alu
      op: Add
      elem_width: B
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vadd.h:
    description: vadd.h vd, vj, vk (vector add halfword)
    operations:
    - type: vector_alu
      op: Add
      elem_width: H
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vadd.w:
    description: vadd.w vd, vj, vk (vector add word)
    operations:
    - type: vector_alu
      op: Add
      elem_width: W
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vadd.d:
    description: vadd.d vd, vj, vk (vector add doubleword)
    operations:
    - type: vector_alu
      op: Add
      elem_width: D
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vsub.b:

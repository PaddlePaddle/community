      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vsub.w:
    description: vsub.w vd, vj, vk (vector subtract word)
    operations:
    - type: vector_alu
      op: Sub
      elem_width: W
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vsub.d:
    description: vsub.d vd, vj, vk (vector subtract doubleword)
    operations:
    - type: vector_alu
      op: Sub
      elem_width: D
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vand.v:
    description: vand.v vd, vj, vk (vector and)
    operations:
    - type: vector_alu
      op: And
      elem_width: B
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vor.v:
    description: vor.v vd, vj, vk (vector or)
    operations:
    - type: vector_alu
      op: Or
      elem_width: B
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vxor.v:
    description: vxor.v vd, vj, vk (vector xor)
    operations:
    - type: vector_alu
      op: Xor
      elem_width: B
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vnor.v:
    description: vnor.v vd, vj, vk (vector nor)
    operations:
    - type: vector_alu
      op: Nor
      elem_width: B
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"

  vreplgr2vr.b:
    description: vreplgr2vr.b vd, rj (replicate gpr to vector byte)
    operations:
    - type: vector_broadcast
      elem_width: B
      dest: "$v.d"
      src: "$r.j"

  vreplgr2vr.h:
    description: vreplgr2vr.h vd, rj (replicate gpr to vector halfword)
    operations:
    - type: vector_broadcast
      elem_width: H
      dest: "$v.d"
      src: "$r.j"

  vreplgr2vr.w:
    description: vreplgr2vr.w vd, rj (replicate gpr to vector word)
    operations:
    - type: vector_broadcast
      elem_width: W
      dest: "$v.d"
      src: "$r.j"

  vreplgr2vr.d:
    description: vreplgr2vr.d vd, rj (replicate gpr to vector doubleword)
    operations:
    - type: vector_broadcast
      elem_width: D
      dest: "$v.d"
      src: "$r.j"

  vld:
    description: vld vd, rj, imm (vector load 128-bit)
    operations:
    - type: alu
      op: Add
      dest: "$temp:0"
      src1: "$r.j"
      src2: "$imm:12:signed"
    - type: vector_load
      elem_width: B
      dest: "$v.d"
      addr: "$temp:0"
      count: 16

  vst:
    description: vst vd, rj, imm (vector store 128-bit)
    operations:
    - type: alu
      op: Add
      dest: "$temp:0"
      src1: "$r.j"
      src2: "$imm:12:signed"
    - type: vector_store
      elem_width: B
      src: "$v.d"
      addr: "$temp:0"
      count: 16

  vseq.b:
    description: vseq.b vd, vj, vk (vector set if equal byte)
    operations:
    - type: vector_compare
      op: Eq
      elem_width: B
      dest: "$v.d"
      src1: "$v.j"
      src2: "$v.k"


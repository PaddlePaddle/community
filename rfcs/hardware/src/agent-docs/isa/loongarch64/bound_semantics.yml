groups:
  - name: bound
    description: LoongArch Boundary Check Instructions Semantics

semantics:
  asrtle:
    description: "asrtle rj, rk"
    operations:
      - type: compare
        op: Gt
        dest: $temp:0
        src1: $r.j
        src2: $r.k
      - type: conditional_trap
        cond: $temp:0
        exception: "BCE"
    implicit_pc_read: false
    implicit_pc_write: false

  asrtgt:
    description: "asrtgt rj, rk"

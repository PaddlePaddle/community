groups:
- name: base
  description: LoongArch Base Integer Instructions
instructions:
- name: MUL.W
  group: base
  encoding:
    match: 00000000000111000???????????????
  assembly: mul.w $d, $j, $k
  semantics:
    description: mul.w rd, rj, rk
    operations:
    - type: alu
      op: Mul
      dest: $temp:0
      src1: $r.j
      src2: $r.k
    - type: cast
      op:
        Truncate:
          to: 32
      dest: $temp:1
      src: $temp:0
    - type: cast
      op:
        SignExtend:
          from: 32
          to: 64
      dest: $r.d
      src: $temp:1
    implicit_pc_read: false
    implicit_pc_write: false
  format: DJK

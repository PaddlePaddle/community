      msbd:
      - 20
      - 16
      lsbd:
      - 14
      - 10
  assembly: bstrins.w $d, $j, msbd, lsbd
  semantics:
    description: bstrins.w rd, rj, msbd, lsbd
    operations:
    - type: bit_field
      op: Insert
      dest: $r.d
      src: $r.j
      msb:
        field_imm:
          field: msbd
          width: 5
          signed: false
      lsb:
        field_imm:
          field: lsbd
          width: 5
          signed: false
    - type: cast
      op:
        SignExtend:
          from: 32
          to: 64

groups:
- name: base
  description: LoongArch Base Integer Instructions
instructions:
- name: CLO.W
  group: base
  encoding:
    match: 0000000000000000000100??????????
  assembly: clo.w $d, $j
  semantics:
    description: clo.w rd, rj (rd = count_leading_ones(rj[31:0]))
    operations:
    - type: alu
      op: Clow
      dest: $temp:0
      src1: $r.j
    - type: cast
      op:
        SignExtend:
          from: 32
          to: 64
      dest: $r.d
      src: $temp:0
    implicit_pc_read: false
    implicit_pc_write: false
  format: DJ

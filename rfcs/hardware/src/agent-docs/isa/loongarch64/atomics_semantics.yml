groups:
  - name: atomics
    description: LoongArch Atomic Instructions Semantics

semantics:
  ammax_wu:
    description: "ammax.wu rd, rj, rk"
    operations:
      - type: atomic
        op: Maxu
        dest: $r.d
        addr: $r.j
        src: $r.k
        ordering: Relaxed
        size: 4
    implicit_pc_read: false
    implicit_pc_write: false

  ammax_du:
    description: "ammax.du rd, rj, rk"
    operations:
      - type: atomic
        op: Maxu
        dest: $r.d
        addr: $r.j
        src: $r.k
        ordering: Relaxed
        size: 8
    implicit_pc_read: false
    implicit_pc_write: false

  ammin_wu:
